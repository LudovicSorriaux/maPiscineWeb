<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>Dashboard Dygraph Optimisé</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/dygraph/2.2.1/dygraph.min.css" />
    <link rel="stylesheet" href="https://code.jquery.com/mobile/1.4.5/jquery.mobile-1.4.5.min.css" />
    <script src="https://code.jquery.com/jquery-1.11.1.min.js"></script>
    <script src="https://code.jquery.com/mobile/1.4.5/jquery.mobile-1.4.5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dygraph/2.2.1/dygraph.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dygraph/2.2.1/extras/synchronizer.min.js"></script>

    <style>
        /* BASE & THEME */
        html, body { height: 100%; margin: 0; background: #000; overflow: hidden; }
        .ui-page { background: #000; }

        /* STRUCTURE PRINCIPALE */
        .dashboard-card {
            display: flex;
            flex-direction: column;
            width: 100%;
            background: #09090a;
            box-sizing: border-box;
        }

.charts-wrapper {
  display: flex;
  flex: 1;
  min-height: 0;
  min-width: 0; /* Ajout : empêche le débordement horizontal */
  gap: 10px;
  padding: 5px;
  box-sizing: border-box;
}

.graph-zone {
  display: flex;
  flex-direction: column;
  /* Correction cruciale : flex-basis à 0 force une répartition égale */
  flex: 1 1 0; 
  min-height: 0;
  min-width: 0; /* Ajout : permet à la zone de rétrécir si besoin */
  background: #111;
  border-radius: 4px;
  overflow: hidden; /* Empêche les canvas de dépasser */
}

        .graph-header-mini {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 8px;
            background: #1a1a1c;
            border-bottom: 1px solid #333;
        }

        .graph-header-mini select {
            font-size: 11px !important;
            background: #222 !important;
            color: #eee !important;
            border: 1px solid #444 !important;
            padding: 2px !important;
            margin: 0 !important;
        }

.graph-header-mini .header-left {
    display: flex;
    align-items: center;
}

/* Ajustement pour le bouton select de jQuery Mobile */
.graph-header-mini .ui-select {
    margin: 0 !important;
}

.smallLabel {
    color: #aaa;
    font-size: 11px;
    margin-right: 5px;
    text-transform: uppercase;
    font-weight: bold;
}


.graph-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;
  min-width: 0; /* Ajout */
  position: relative;
}
        .graph-canvas {
            flex: 1;
            width: 100% !important;
            height: 100% !important;
        }

        /* Masquer les éléments JQM qui prennent de la place */
        .ui-select .ui-btn { padding: 4px 8px !important; font-size: 11px !important; }
    </style>
</head>
<body>

<div data-role="page" id="graphMainPage">
    <div data-role="header" id="graphHeader" data-theme="b">
        <h1>Dashboard Temps Réel</h1>
    </div>

    <div role="main" class="ui-content" id="graphContent" style="padding:5px;">
        <div id="graphSelectControls" style="margin-bottom:5px;"></div>

		<div class="dashboard-card">
		    <div class="charts-wrapper">
		        <div id="graph-zone-1" class="graph-zone">
		            <div class="graph-header-mini">
		                <label class="select smallLabel">Graphique:</label>
		                <select name="graphSelector1" class="zone-graph-selector" data-zone="1">
		                    <option value="chemistry" selected>Chimie</option>
		                    <option value="temperature">Températures</option>
		                    <option value="equipment">Équipements</option>
		                </select>
		            </div>
		            <div class="graph-content"><div id="graph-canvas-1" class="graph-canvas"></div></div>
		        </div>
		
		        <div id="graph-zone-2" class="graph-zone">
		            <div class="graph-header-mini">
		                <label class="select smallLabel">Graphique:</label>
		                <select name="graphSelector2" class="zone-graph-selector" data-zone="2">
		                    <option value="chemistry">Chimie</option>
		                    <option value="temperature" selected>Températures</option>
		                    <option value="equipment">Équipements</option>
		                </select>
		            </div>
		            <div class="graph-content"><div id="graph-canvas-2" class="graph-canvas"></div></div>
		        </div>
		
		        <div id="graph-zone-3" class="graph-zone">
		            <div class="graph-header-mini">
		                <label class="select smallLabel">Graphique:</label>
		                <select name="graphSelector3" class="zone-graph-selector" data-zone="3">
		                    <option value="chemistry">Chimie</option>
		                    <option value="temperature">Températures</option>
		                    <option value="equipment" selected>Équipements</option>
		                </select>
		            </div>
		            <div class="graph-content"><div id="graph-canvas-3" class="graph-canvas"></div></div>
		        </div>
		    </div>
		</div>
	</div>
</div>

<script>
/**
 * --- 1. DONNÉES ET FORMATAGE ---
 */
const globalData = (function() {
    const data = [];
    const t = new Date();
    for (let i = 0; i < 500; i++) {
        const x = new Date(t.getTime() + i * 1000 * 60);
        const y1 = 10 + Math.sin(i / 20) * 5;  // Chimie
        const y2 = 200 + Math.cos(i / 20) * 50; // Température
        const y3 = 50 + Math.random() * 10;     // Équipement
        data.push([x, y1, y2, y3]); 
    }
    return data;
})();

function formatYAxisLabelLimit4(v) {
    try {
        if (v === null || v === undefined || Number.isNaN(v)) return '';
        const absV = Math.abs(v);
        if (absV < 1000) {
            const s = Number(v).toFixed(2);
            return s.replace(/\.00$/, '').replace(/\.(\d)0$/, '.$1');
        }
        if (absV < 10000) return String(Math.round(v));
        if (absV < 1e6) return (v / 1000).toFixed(2).replace(/\.00$/, '') + 'k';
        return (v / 1e6).toFixed(2).replace(/\.00$/, '') + 'M';
    } catch (e) { return String(v); }
}

/**
 * --- 2. DÉTECTION DU MODE ET LAYOUT ---
 */
function getGraphMode() {
    var mqDesktopLandscape = window.matchMedia('(min-width: 1101px) and (orientation: landscape)');
    var mqDesktopPortrait = window.matchMedia('(min-height: 1101px) and (orientation: portrait)');
    var mqTabletPortrait = window.matchMedia('(min-width: 701px) and (max-width: 1100px) and (max-height: 1100px) and (orientation: portrait)');
    var mqTabletLandscape = window.matchMedia('(min-width: 701px) and (max-width: 1100px) and (max-height: 1100px) and (orientation: landscape)');
    var mqMobilePortrait = window.matchMedia('(max-width: 700px) and (orientation: portrait)');
    var mqMobileLandscape = window.matchMedia('(max-height: 700px) and (orientation: landscape)');

    if (mqDesktopLandscape.matches) return 'desktop-landscape';
    if (mqDesktopPortrait.matches)  return 'desktop-portrait';
    if (mqTabletLandscape.matches)  return 'tablet-landscape';
    if (mqTabletPortrait.matches)   return 'tablet-portrait';
    if (mqMobileLandscape.matches)  return 'mobile-landscape';
    if (mqMobilePortrait.matches)   return 'mobile-portrait';

    var width = window.innerWidth;
    var isLandscape = window.innerWidth > window.innerHeight;
    if (width < 768) return isLandscape ? 'mobile-landscape' : 'mobile-portrait';
    if (width < 1024 || !isLandscape) return isLandscape ? 'tablet-landscape' : 'tablet-portrait';
    return isLandscape ? 'desktop-landscape' : 'desktop-portrait';
}

function determineLayout() {
    const mode = getGraphMode();
    const isLandscape = mode.includes('landscape');
    let count = 1;
    
    if (mode.includes('mobile')) count = isLandscape ? 2 : 1;
    else if (mode.includes('tablet')) count = 2;
    else if (mode.includes('desktop')) count = 3;

    return { count, orientation: isLandscape ? 'row' : 'column', isLandscape };
}

/**
 * --- 3. GESTION DES GRAPHIQUES ---
 */
let g1 = null, g2 = null, g3 = null, syncHandler = null;
let isInteracting = false;
let interactionTimeout = null;


// Strictement le même ordre que dans votre globalData [Date, y1, y2, y3]
const MASTER_LABELS = ["Time", "Chimie", "Température", "Équipement"];
const MASTER_COLORS = ['#00FBFF', '#FF6B6B', '#2ECC71'];


function applyChartHeights() {
    const headerH = $('#graphHeader').outerHeight() || 0;
    const availableH = window.innerHeight - headerH - 20;
    
    // On force la hauteur ET la largeur pour éviter les reliquats du mode précédent
    $('.dashboard-card').css({
        'height': Math.max(availableH, 250) + 'px',
        'width': '100%' 
    });

    const layout = determineLayout();
    
    // On s'assure que le wrapper occupe bien tout l'espace
    $('.charts-wrapper').css({
        'flex-direction': layout.orientation,
        'width': '100%',
        'height': '100%',
        'box-sizing': 'border-box'
    });

    for (let i = 1; i <= 3; i++) {
        const $zone = $(`#graph-zone-${i}`);
        if (i <= layout.count) {
            $zone.show().css('display', 'flex');
        } else {
            $zone.hide();
        }
    }
}

/**
 * Génère l'objet de configuration complet pour une instance Dygraph
 * @param {number} index - L'index du graphique (1, 2 ou 3)
 * @param {number} totalCount - Nombre total de graphiques affichés
 * @param {boolean} isLandscape - Mode paysage ou portrait
 */


function getGraphOptions(index, totalCount, isLandscape, type) {
    const showBottomUI = isLandscape || (index === totalCount);
    
    // Mapping du Type -> Visibilité [y1, y2, y3]
    let seriesVisibility = [true, false, false]; 
    if (type === "temperature") seriesVisibility = [false, true, false];
    if (type === "equipment")   seriesVisibility = [false, false, true];

    return {
        // Obligatoire : les mêmes labels pour tous pour que la synchro fonctionne
        labels: ["Time", "Chimie", "Température", "Équipement"],
        visibility: seriesVisibility,
        
        // Couleurs néons (Cyan, Corail, Émeraude)
        colors: ['#00FBFF', '#FF6B6B', '#2ECC71'],
        strokeWidth: 2.0,
        fillGraph: true,
        fillAlpha: 0.15,
        
        // Style Sombre
        backgroundColor: '#000000',
        gridLineColor: '#333333',
        axisLineColor: '#FFFFFF',
        axisLabelColor: '#FFFFFF',
        yAxisLabelWidth: 35,
        
        // Légende flottante lisible
        legend: 'always',
        labelsDivStyles: { 
            'color': '#FFFFFF', 
            'backgroundColor': 'rgba(0,0,0,0.5)', 
            'borderRadius': '5px',
            'padding': '3px'
        },
        
        // Range Selector & Axes
        showRangeSelector: showBottomUI,
        rangeSelectorHeight: 30,
        rangeSelectorPlotStrokeColor: '#00FBFF',
        rangeSelectorPlotFillColor: 'rgba(0,251,255,0.1)',
        axes: {
            x: { drawAxis: showBottomUI },
            y: {
                drawAxis: true,
                axisLabelFormatter: formatYAxisLabelLimit4,
                valueFormatter: (v) => v.toFixed(2)
            	}
        	},
        // Maintien du zoom (sans créer de boucle infinie)
        dateWindow: (g1) ? g1.xAxisRange() : null
    };
}



function updateGraphs() {

    if (isInteracting) return; // Si l'utilisateur est en train de manipuler un graphique, on sort immédiatement de la fonction.
	// OU si on est dans le cooldown, on ne fait RIEN
    
	if (isInteracting) {			// Si l'utilisateur est en train de manipuler un graphique,
									// OU si on est dans le cooldown, on ne fait RIEN
        console.log("Update bloqué : Graphique en cours de manipulation");
        return; 
    }
	
    const layout = determineLayout();
    if (syncHandler) { 									// On détache la synchro avant de modifier les graphes
        try { syncHandler.detach(); } catch(e) {} 
        syncHandler = null; 
    }

    for (let i = 1; i <= 3; i++) {
        const $zone = $(`#graph-zone-${i}`);
        const container = document.getElementById(`graph-canvas-${i}`);
        
        if (i <= layout.count && container) {
            $zone.show().css('display', 'flex');
            
            // On récupère la valeur de TON sélecteur HTML
            const currentType = $zone.find('select.zone-graph-selector').val() || 'chemistry';
            
            const options = getGraphOptions(i, layout.count, layout.isLandscape, currentType);
            let gObj = (i === 1 ? g1 : (i === 2 ? g2 : g3));

            if (!gObj) {
                // Création initiale
                gObj = new Dygraph(container, globalData, options);
                if (i === 1) g1 = gObj; else if (i === 2) g2 = gObj; else g3 = gObj;
            } else {
                // Mise à jour fluide (On retire dateWindow pour éviter le bug de disparition au mouvement)
                delete options.dateWindow;
                gObj.updateOptions(options);
            }
        } else {
            $zone.hide();
            destroyGraphInstance(i);
        }
    }

    // Ré-attachement de la synchronisation (Zoom et Range Selector)
    window.requestAnimationFrame(() => {
        const activeGraphs = [g1, g2, g3].filter(g => g !== null);
        if (activeGraphs.length >= 2) {
            syncHandler = Dygraph.synchronize(activeGraphs, {
                selection: true,
                zoom: true,
                range: true
            });
        }
    });
}

function destroyGraphInstance(i) {
    if (i === 1 && g1) { g1.destroy(); g1 = null; }
    if (i === 2 && g2) { g2.destroy(); g2 = null; }
    if (i === 3 && g3) { g3.destroy(); g3 = null; }
}


/**
 * --- 4. INITIALISATION ET RESIZE ---
 */
function initCharts() {
    // 1. On ne touche plus au HTML des zones (on le laisse statique)
    // On s'assure juste que les zones sont prêtes.

    // 2. Ajuster les hauteurs CSS initiales
    applyChartHeights();

    // 3. Créer/Mettre à jour les graphiques Dygraph
    updateGraphs();

    // 4. ResizeObserver : Surveille la carte et ajuste les graphes SANS timeout
    // On vérifie si l'observateur n'existe pas déjà pour éviter les doublons
    if (!window.chartObserver) {
        const dashboard = document.querySelector('.dashboard-card');
        if (dashboard) {
            window.chartObserver = new ResizeObserver(() => {
                window.requestAnimationFrame(() => {
                    // resize() recalcule le canvas pour qu'il remplisse parfaitement sa zone
                    if (g1) g1.resize(); 
                    if (g2) g2.resize(); 
                    if (g3) g3.resize();
                });
            });
            window.chartObserver.observe(dashboard);
        }
    }
}

/**
 * --- 4. USERACTION ---
 */
 function changeGraphType(index, newType) {
    console.log(`[ACTION] Zone ${index} passe sur : ${newType}`);
    
    // 1. On mémorise le type sur le conteneur
    $(`#graph-zone-${index}`).attr('data-graph-type', newType);
    
    // 2. On récupère l'instance du graphe
    let gObj = (index === 1 ? g1 : (index === 2 ? g2 : g3));
    
    if (gObj) {
        const layout = determineLayout();
        // 3. On génère les nouvelles options (incluant la nouvelle visibilité)
        const newOptions = getGraphOptions(index, layout.count, layout.isLandscape, newType);
        
        // 4. Mise à jour fluide
        gObj.updateOptions(newOptions);
    }
}

/**
 * 6. ÉVÉNEMENTS
 */
 
// Changement manuel via selecteur
$(document).on('change', '.zone-graph-selector', function() {
    updateGraphs();
});


// 1. On détecte le début du mouvement (Toucher ou Clic)
// 1. Début du toucher : Verrouillage immédiat
$(document).on('pointerdown', '.dygraph-rangesel-fgcanvas, .dygraph-rangesel-zoomhandle', function() {
    isInteracting = true;
    // On annule un éventuel timeout de fin de mouvement précédent
    clearTimeout(interactionTimeout);
});

// 2. Fin du toucher : On attend un peu avant de libérer
$(document).on('pointerup pointercancel', function() {
    // On laisse 100ms au moteur de Dygraph pour finir ses calculs de "snap"
    interactionTimeout = setTimeout(function() {
        isInteracting = false;
    }, 100); 
});



// Redimensionnement / Rotation
$(window).on('resize orientationchange', function() {
    applyChartHeights();
    window.requestAnimationFrame(() => {
        updateGraphs();
        if (g1) g1.resize();
        if (g2) g2.resize();
        if (g3) g3.resize();
    });
});

// Initialisation JQM
$(document).on('pageshow', '#graphMainPage', function() {
    initCharts();
});

</script>
</body>
</html>
